<script>
    let ws = new WebSocket("ws://10.128.52.94:50874/actions");
    let playerName = null;
    let inQuestion = false;
	
    ws.onopen = () => sendAction("admin", "GetPlayers", NaN, NaN, 0);

    function sendAction(user, action, category, question, value) {
        ws.send(JSON.stringify({ user, action, category, question, value }));
    }

    function allowBonus(btn) {
      if (btn.value !== "Bonus") return true;

      const children = btn.parentElement.children;
      let count = 0;
      for (let i = 0; i < children.length; i++) {
        const style = window.getComputedStyle(children[i]);
        if (style.visibility !== "hidden") {
            count++; // found a visible child
        }
      }

      return count === 2;
    }

    const buttons = document.querySelectorAll(".question");

    buttons.forEach(btn => {
        btn.addEventListener("click", (event) => {
          if (!inQuestion && allowBonus(btn)) {
            event.preventDefault();
            sendAction("admin", "Open", btn.parentElement.id, btn.id, 0);
            btn.style.visibility = "hidden";
            inQuestion = true;
          }
        });
    });

    document.getElementById("clear").addEventListener("click", function(e) {
        e.preventDefault();
        sendAction("admin", "Clear", NaN, NaN, 0);
    });

    document.getElementById("showContent").addEventListener("click", function(e) {
        e.preventDefault();
        sendAction("admin", "Show", NaN, NaN, 0);
    });

    document.getElementById("stopContent").addEventListener("click", function(e) {
        e.preventDefault();
        sendAction("admin", "Stop", NaN, NaN, 0);
    });

    document.getElementById("showAnswer").addEventListener("click", function(e) {
        e.preventDefault();
        sendAction("admin", "Answer", NaN, NaN, 0);
    });

    document.getElementById("continue").addEventListener("click", function(e) {
        e.preventDefault();
        sendAction("admin", "Continue", NaN, NaN, 0);
        document.getElementById("questionText").innerText = "";
        document.getElementById("questionAnswer").innerText = "";
        inQuestion = false;
    });

    function AddPlayer(parent, user, content, symbol) {
      const btn = document.createElement("input");
      btn.id = "btn_" + user;
      btn.classList.add("button", "altButton");
      btn.value = user + symbol;
      btn.type = "button";

      btn.addEventListener("click", () => {
          sendAction("admin", "Increment", user, NaN, content);
      });

      document.getElementById(parent).appendChild(btn);
    }

    ws.onmessage = (event) => {
      console.log(event.data);
	    const msg = JSON.parse(event.data);

      if (msg.action === "Question") {

        if (msg.type === 0) {
          document.getElementById("questionText").innerText = msg.content;
        } else if (msg.type === 1) {
          document.getElementById("questionText").innerText = "This is an image question";
        } else if (msg.type === 2) {
          document.getElementById("questionText").innerText = "This is an audio question";
        }

        document.getElementById("questionAnswer").innerText = msg.answer;

      } else if (msg.action === "PlayerAdd") {
        AddPlayer("playerPlus", msg.user, msg.content, " +");
        AddPlayer("playerMinus", msg.user, "-" + msg.content, " -");
      }
    }
  </script>
