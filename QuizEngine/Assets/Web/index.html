<!DOCTYPE html>
<html>
<style>
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 5vh;
  font-family: "Copperplate", sans-serif;
  color: white;
}
.button {
  background-color: #660000;
  border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  cursor: pointer;
}
@media only screen and (min-width: 1000px) {
.input {
  border-width:0px;
  background:linear-gradient(#220000, #440000, #440000, #440000, #440000, #440000, #661111);
  border-radius:20px;
  margin-top:0px;
  font-size: 3vw;
  width:50vw
}
}
@media only screen and (max-width: 999px) {
.input {
  border-width:0px;
  background:linear-gradient(#220000, #440000, #440000, #440000, #440000, #440000, #661111);
  border-radius:20px;
  margin-top:0px;
  font-size: 10vw;
  width:50vw
}
}

</style>
<body style="background:radial-gradient(#330000, #000000);">

<form id="myForm" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;">
  <label for="name" class="center" style="font-style:oblique;font-weight:bold;color:white">Screen name:</label>
  <div class="center">
    <input type="text" id="name" name="name" class="center input" maxlength="30" minlength="1" style="gap:2vh;">
    <br><br>
  </div>
  <input type="submit" value="Submit" class="button" style="font-style:oblique;font-weight:bold;">
  <p class="center" id="wrongName" style="color:red;display:block;font-size:2vw;visibility:hidden;">Selected name is invalid</p>
</form>

<script>
    let ws = new WebSocket("ws://10.128.52.94:54399/actions");
    let playerName = null;
	
    ws.onopen = () => console.log("Connected!");

    function sendAction(user, action) {
	    document.getElementById("wrongName").style.visibility = "hidden";
        ws.send(JSON.stringify({ user, action }));
    }

    ws.onmessage = (event) => {
	    console.log("Recieved", event.data);

        if (event.data === "Valid") {
	    window.location.href = "user.html?name=" + playerName;
        } else {
          document.getElementById("wrongName").innerText = event.data;
          document.getElementById("wrongName").style.visibility = "visible";   
        }  
    }

    document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault(); // stop page reload

    const name = document.getElementById("name").value;
    if (name === "admin")
    	window.location.replace("admin.html");
    else {
	    playerName = name;
	    sendAction(playerName, "Init");
    }

    console.log("Sent via WebSocket:", name);
  });
</script>

</body>
</html>
